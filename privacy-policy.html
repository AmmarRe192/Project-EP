<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Politika e privatësisë e Elixir Pharmacy - Tetovë." />
  <link rel="canonical" href="https://elixirpharmacy.mk/privacy-policy" />
  <meta name="robots" content="index, follow" />

  <link rel="icon" type="image/png" href="/images/logo-light.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

  <!-- Apply saved theme immediately to avoid flash -->
  <script>
    (function() {
      const t = localStorage.getItem('elixir-theme') || 'light';
      if (t === 'light') document.documentElement.classList.add('light');
    })();
  </script>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/privacy.css">

<body>

<!-- NAVBAR (identical markup to index.html so it reuses the same shared CSS/JS) -->
<nav id="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img class="logo-dark" src="images/logo-dark.png" alt="Elixir Pharmacy logo" />
      <img class="logo-light" src="images/logo-light.png" alt="Elixir Pharmacy logo" />
      <span>Elixir Pharmacy</span>
    </a>
    <div class="nav-controls">
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="sun-icon" id="theme-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg class="moon-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span class="theme-label" id="theme-label">Dark</span>
      </button>
      <div id="lang-dropdown">
        <button id="lang-btn" onclick="toggleLangMenu()" aria-haspopup="true" aria-expanded="false">
          <span class="flag" id="lang-flag">🇦🇱</span>
          <span class="lang-label" id="lang-current">Shqip</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>
        <div id="lang-menu" role="menu">
          <button onclick="setLang('sq')" class="active" data-lang="sq">
            <span class="flag">🇦🇱</span> Shqip — SQ
          </button>
          <div class="lang-divider"></div>
          <button onclick="setLang('mk')" data-lang="mk">
            <span class="flag">🇲🇰</span> Македонски — MK
          </button>
          <div class="lang-divider"></div>
          <button onclick="setLang('en')" data-lang="en">
            <span class="flag">🇬🇧</span> English — EN
          </button>
          <div class="lang-divider"></div>
          <button onclick="setLang('tr')" data-lang="tr">
            <span class="flag">🇹🇷</span> Türkçe — TR
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
